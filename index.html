<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G4V Clarksville Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="g4v-grad-banner">
        <h2 class="g4v-grad-title">G4V Graduation</h2>
        <p class="g4v-grad-date">May 22, 2026</p>
        <div class="g4v-collage-row">
            <img src="G4V_Class_22May.png" alt="Group" class="g4v-collage-photo">
            <img src="graduation_photo2.png" alt="Perf" class="g4v-collage-photo">
            <img src="graduation_photo3.png" alt="Cert" class="g4v-collage-photo">
            <img src="graduation_photo4.png" alt="F1" class="g4v-collage-photo">
            <img src="graduation_photo5.png" alt="F2" class="g4v-collage-photo">
            <img src="graduation_photo6.png" alt="F3" class="g4v-collage-photo">
            <img src="graduation_photo7.png" alt="F4" class="g4v-collage-photo">
            <img src="graduation_photo8.png" alt="F5" class="g4v-collage-photo">
        </div>
    </div>

    <header class="header-inner">
        <div class="header-main-content">
            <img src="Picture1.png" alt="G4V Logo" class="header-logo g4v-logo">
            <div class="header-titles">
                <h1>Guitars For Vets: Clarksville Chapter</h1>
                <p class="chapter-metadata">Chapter #287 &bull; Est. February 18, 2026</p>
            </div>
            <img src="OSD logo.jpg" alt="OSD Logo" class="header-logo osd-logo">
        </div>
        <div class="header-qr">
            <img src="clarksvilleQR.png" alt="Scan to donate">
            <p>Scan to donate &amp; <a href="https://guitars4vets.org" target="_blank">learn more</a></p>
        </div>
    </header>

    <div class="dashboard-top-row">
        <div class="stat-card">
            <span class="stat-label">Total Veterans Reached</span>
            <span id="total-vets" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Graduated Alumni</span>
            <span id="grad-count" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Select Year</span>
            <div class="year-options"><span class="year-pill active">2026</span><span class="year-pill">2027</span></div>
        </div>
    </div>

    <div id="active-leads" style="display:none;"></div>
    
    <div class="search-container">
        <input type="text" id="vet-search" placeholder="Search Veteran Name...">
    </div>

    <main id="dashboard-root"></main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</body>
</html>
