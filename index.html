<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G4V Clarksville Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="g4v-grad-banner">
    <h2 class="g4v-grad-title">G4V Graduation</h2>
    <p class="g4v-grad-date">May 22, 2026</p>

    <div class="g4v-collage-row">
        <img src="G4V_Class_22May.png" class="g4v-collage-photo">
        <img src="graduation_photo2.png" class="g4v-collage-photo">
        <img src="graduation_photo3.png" class="g4v-collage-photo">
        <img src="graduation_photo4.png" class="g4v-collage-photo">
        <img src="graduation_photo5.png" class="g4v-collage-photo">
        <img src="graduation_photo6.png" class="g4v-collage-photo">
        <img src="graduation_photo7.png" class="g4v-collage-photo">
        <img src="graduation_photo8.png" class="g4v-collage-photo">
    </div>
</div>

<header>
    <div class="header-inner">
        <div class="header-main-content">
            <img src="Picture1.png" class="header-logo g4v-logo">

            <div class="header-titles">
                <h1>Guitars For Vets: Clarksville Chapter</h1>
                <p class="chapter-metadata">Chapter #287 • Est. February 18, 2026</p>
            </div>

            <img src="OSD logo.jpg" class="header-logo osd-logo">
        </div>

        <div class="header-qr">
            <img src="clarksvilleQR.png">
            <p>Scan to donate & <a href="https://guitars4vets.org">learn more</a></p>
        </div>
    </div>
</header>

<!-- IMPACT SUMMARY -->
<div id="impact-summary">

    <div class="stat-card">
        <span class="stat-label">Veterans Reached</span>
        <span id="total-vets" class="stat-value">0</span>
    </div>

    <div class="stat-card">
        <span class="stat-label">Graduated Alumni</span>
        <span id="grad-count" class="stat-value">0</span>
    </div>

    <div class="stat-card">
        <span class="stat-label">Active Cohort</span>
        <span id="active-count" class="stat-value">0</span>
    </div>

    <div class="stat-card">
        <span class="stat-label">Waitlist</span>
        <span id="waitlist-stat" class="stat-value">0</span>
    </div>

    <div class="stat-card">
        <span class="stat-label">Avg Days To Start</span>
        <span id="avg-days" class="stat-value">--</span>
    </div>

    <div class="stat-card year-selector-card">
        <span class="stat-label">Select Year</span>
        <div class="year-options">
            <span class="year-pill active">2026</span>
            <span class="year-pill">2027</span>
            <span class="year-pill">2028</span>
            <span class="year-pill">2029</span>
            <span class="year-pill">2030</span>
        </div>
    </div>

</div>

<div class="search-container">
    <input id="vet-search" placeholder="Search Veteran Name..." onkeyup="searchVets()">
</div>

<main id="dashboard-root"></main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
const mainContainer = document.getElementById('dashboard-root');
let allCycleData = [];

/* -----------------------------
   WAITLIST TOGGLE
----------------------------- */
function toggleWaitlist() {
    const content = document.getElementById('waitlist-content');
    const arrow = document.getElementById('waitlist-arrow');

    if (content.style.display === "none") {
        content.style.display = "block";
        arrow.innerText = "▲ CLOSE LIST";
    } else {
        content.style.display = "none";
        arrow.innerText = "▼ VIEW LIST";
    }
}

/* -----------------------------
   CYCLE PROGRESS
----------------------------- */
function calculateProgress(cycle) {
    const today = new Date();

    if (!cycle.startDate || !cycle.endDate) return 0;
    if (cycle.status === "Completed") return 100;

    if (cycle.status === "Active" && cycle.vets.length > 0) {
        const totalPossibleSessions = cycle.vets.length * 10;

        const actualSessionsCompleted = cycle.vets.reduce((sum, vet) => {
            const sessions = vet.session !== undefined
                ? vet.session
                : (vet.currentSession || 0);

            return sum + (parseInt(sessions) || 0);
        }, 0);

        return Math.min(
            100,
            Math.round((actualSessionsCompleted / totalPossibleSessions) * 100)
        );
    }

    const start = new Date(cycle.startDate);
    const end = new Date(cycle.endDate);

    if (today < start) return 0;

    const totalDuration = end - start;
    const elapsed = today - start;

    return totalDuration > 0
        ? Math.min(99, Math.round((elapsed / totalDuration) * 100))
        : 0;
}

            /* -----------------------------
               DASHBOARD BUILD
            ----------------------------- */
         function buildDashboard(cycleData) {

    const reached = new Set();
    const alumni = new Set();
    const active = new Set();
    const deferred = new Set();

    mainContainer.innerHTML = '';

    cycleData.forEach(cycle => {

        const cycleStatus = (cycle.status || "").toLowerCase();
        const progressValue = calculateProgress(cycle);

        let rows = '';

        cycle.vets.forEach(vet => {

            const vetKey = (vet.name || "").trim().toLowerCase();
            const statusText = (vet.status || "").toLowerCase().trim();
            const sessionCount = parseInt(vet.session) || 0;
            const availabilityText = vet.availability || "";

            // KPI sets
            if (statusText !== "dropped") reached.add(vetKey);
            if (statusText === "graduated") alumni.add(vetKey);
            if (statusText === "active") active.add(vetKey);
            if (statusText === "deferred") deferred.add(vetKey);

            // DISPLAY STATUS (MUST BE INSIDE LOOP)
            let displayStatus = "";

            if (statusText === "dropped") displayStatus = "Dropped";
            else if (statusText === "waiting") displayStatus = "Waiting";
            else if (statusText === "deferred") displayStatus = "Deferred";
            else if (statusText === "graduated") displayStatus = "Graduated";
            else if (statusText === "active") displayStatus = "In Lessons";
            else displayStatus = "Unknown";

            rows += `
                <tr>
                    <td>${vet.seq || '-'}</td>
                    <td class="vet-name-cell">${vet.name || ''}</td>
                    <td>${sessionCount} / 10</td>
                    <td>${displayStatus}</td>
                    <td>${availabilityText}</td>
                </tr>
            `;
        });

        const section = document.createElement('section');
        section.className = 'cycle-card';

        section.innerHTML = `
            <div class="card-header">
                <h2>Cycle ${cycle.cycleId} (${cycle.status})</h2>

                <div class="cycle-timeline">
                    <span class="timeline-label">TIMELINE:</span>
                    <span class="timeline-dates">
                        ${cycle.startDate || "TBD"} — ${cycle.endDate || "TBD"}
                    </span>
                </div>

                <div class="progress-container">
                    <div class="progress-bar" style="width:${progressValue}%"></div>
                    <span class="progress-text">${progressValue}% Cycle Progress</span>
                </div>
            </div>

            <div class="instructor-box">
                Assigned: ${(cycle.instructors || []).join(' & ')}
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Seq#</th>
                        <th>Veteran</th>
                        <th>Session</th>
                        <th>Status</th>
                        <th>Availability</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        `;

        mainContainer.appendChild(section);
    });

    document.getElementById('total-vets').innerText = reached.size;
    document.getElementById('grad-count').innerText = alumni.size;
    document.getElementById('active-count').innerText = active.size;
}
            
/* -----------------------------
   DATA LOADING (FIXED)
----------------------------- */
function loadDataFromGoogle() {

    const csvUrl =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZrgM6dmSRKecR8YR63T4Hvhq9vShmdLKvyqkx-HbO7DbXVNpBdhBl5SfOJFzvtFWBBwYnVYpNo_5z/pub?output=csv";

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        complete: (r) => processExcelData(r.data)
    });
}

/* -----------------------------
   PROCESS DATA
----------------------------- */
function processExcelData(rawRows) {

    const groupedData = {};
    const waitlist = [];

    rawRows.forEach(row => {

        const id = row.cycleId ? row.cycleId.trim() : "";
        const status = row.status ? row.status.trim() : "";

        if ((status === "Waiting" || status === "Deferred") && row.vetName) {
            waitlist.push({
                name: row.vetName,
                availability: row.availability || "Waiting",
                notes: status,
                session: row.currentSession || 0
            });

            if (!id) return;
        }

        if (id) {

            if (!groupedData[id]) {
                groupedData[id] = {
                    cycleId: id,
                    status: row.status,
                    startDate: row.startDate,
                    endDate: row.endDate,
                    instructorSet: new Set(),
                    vets: []
                };
            }

            if (row.instructors) {
                row.instructors.split(',')
                    .forEach(n =>
                        groupedData[id].instructorSet.add(n.trim())
                    );
            }

            groupedData[id].vets.push({
                seq: row.vetSeq,
                name: row.vetName,
                availability: row.availability,
                session: row.currentSession
            });
        }
    });

    renderWaitlist(waitlist);

    allCycleData = Object.values(groupedData).map(c => {
        c.instructors = Array.from(c.instructorSet);
        return c;
    });

    filterByYear("2026");
}

/* -----------------------------
   WAITLIST
----------------------------- */
function renderWaitlist(waitlist) {
    const waitStat = document.getElementById('waitlist-stat');
    if (waitStat) waitStat.innerText = waitlist.length;
}

/* -----------------------------
   YEAR FILTER
----------------------------- */
function filterByYear(year) {
    const filtered = allCycleData.filter(cycle => {
        if (!cycle.startDate) return false;
        return new Date(cycle.startDate).getFullYear().toString() === year;
    });

    buildDashboard(filtered);
}

/* -----------------------------
   SEARCH
----------------------------- */
function searchVets() {
    const input = document.getElementById('vet-search').value.toLowerCase();

    document.querySelectorAll('#dashboard-root .cycle-card').forEach(card => {
        let match = false;

        card.querySelectorAll('tbody tr').forEach(row => {
            const name = row.querySelector('.vet-name-cell')?.textContent.toLowerCase() || "";

            if (name.includes(input)) {
                row.style.display = "";
                match = true;
            } else {
                row.style.display = "none";
            }
        });

        card.style.display = match ? "" : "none";
    });
}

/* -----------------------------
   INIT
----------------------------- */
initializeYearSelector();
loadDataFromGoogle();

function initializeYearSelector() {
    document.querySelectorAll('.year-pill').forEach(pill => {
        pill.addEventListener('click', () => {
            document.querySelectorAll('.year-pill').forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
            filterByYear(pill.textContent.trim());
        });
    });
}
</script>

</body>
</html>
