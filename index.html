<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G4V Clarksville Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="g4v-grad-banner">
    <h2 class="g4v-grad-title">G4V Graduation</h2>
    <p class="g4v-grad-date">May 22, 2026</p>

    <div class="g4v-collage-row">
        <img src="G4V_Class_22May.png" class="g4v-collage-photo">
        <img src="graduation_photo2.png" class="g4v-collage-photo">
        <img src="graduation_photo3.png" class="g4v-collage-photo">
        <img src="graduation_photo4.png" class="g4v-collage-photo">
        <img src="graduation_photo5.png" class="g4v-collage-photo">
        <img src="graduation_photo6.png" class="g4v-collage-photo">
        <img src="graduation_photo7.png" class="g4v-collage-photo">
        <img src="graduation_photo8.png" class="g4v-collage-photo">
    </div>
</div>

<header>
    <div class="header-inner">
        <div class="header-main-content">
            <img src="Picture1.png" class="header-logo g4v-logo">

            <div class="header-titles">
                <h1>Guitars For Vets: Clarksville Chapter</h1>
                <p class="chapter-metadata">Chapter #287 • Est. February 18, 2026</p>
            </div>

            <img src="OSD logo.jpg" class="header-logo osd-logo">
        </div>

        <div class="header-qr">
            <img src="clarksvilleQR.png">
            <p>Scan to donate & <a href="https://guitars4vets.org">learn more</a></p>
        </div>
    </div>
</header>

<!-- IMPACT SUMMARY -->
<div id="impact-summary">
    <div class="stat-card">
        <span class="stat-label">Total Veterans Reached</span>
        <span id="total-vets" class="stat-value">0</span>
    </div>

    <div class="stat-card">
        <span class="stat-label">Graduated Alumni</span>
        <span id="grad-count" class="stat-value">0</span>
    </div>

    <div class="stat-card year-selector-card">
        <span class="stat-label">Select Year</span>
        <div class="year-options">
            <span class="year-pill active">2026</span>
            <span class="year-pill">2027</span>
            <span class="year-pill">2028</span>
        </div>
    </div>
</div>

<div class="search-container">
    <input id="vet-search" placeholder="Search Veteran Name..." onkeyup="searchVets()">
</div>

<main id="dashboard-root"></main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
const mainContainer = document.getElementById("dashboard-root");
let allCycleData = [];

/* -----------------------------
   PROGRESS CALC
----------------------------- */
function calculateProgress(cycle) {
    const today = new Date();

    if (!cycle.startDate || !cycle.endDate) return 0;
    if ((cycle.status || "").toLowerCase() === "completed") return 100;

    const start = new Date(cycle.startDate);
    const end = new Date(cycle.endDate);

    if (today < start) return 0;

    const total = end - start;
    const elapsed = today - start;

    return total > 0
        ? Math.min(99, Math.round((elapsed / total) * 100))
        : 0;
}

/* -----------------------------
   DASHBOARD RENDER
----------------------------- */
function buildDashboard(cycleData) {

    let totalReached = 0;
    let totalGrads = 0;

    mainContainer.innerHTML = "";

    cycleData.forEach(cycle => {

        const cycleStatus = (cycle.status || "").toLowerCase().trim();
        const progressValue = calculateProgress(cycle);

        let rows = "";

        cycle.vets.forEach(vet => {

            const sessionCount = parseInt(vet.session) || 0;
            const avail = (vet.availability || "").toLowerCase().trim();

            // -----------------------
            // ALUMNI
            // -----------------------
            const isAlumni =
                avail === "graduated" ||
                cycleStatus === "completed" ||
                sessionCount >= 10;

            if (isAlumni) totalGrads++;

            // -----------------------
            // REACHED
            // -----------------------
            const isReached =
                (cycleStatus === "active" || cycleStatus === "in lessons") &&
                sessionCount >= 1 &&
                sessionCount <= 10;

            if (isReached) totalReached++;

            // -----------------------
            // ROW DISPLAY LOGIC
            // -----------------------
            let displayStatus = "";

            if (avail === "dropped") displayStatus = "Dropped";
            else if (avail === "deferred" || avail === "waiting") displayStatus = "Waiting";
            else if (sessionCount >= 10 || avail === "graduated") displayStatus = "Graduated";
            else if (sessionCount > 0) displayStatus = "In Lessons";
            else displayStatus = (cycleStatus === "active") ? "In Lessons" : "Confirmed";

            rows += `
                <tr>
                    <td>${vet.seq || "-"}</td>
                    <td class="vet-name-cell">${vet.name}</td>
                    <td>${sessionCount} / 10</td>
                    <td>${displayStatus}</td>
                    <td>${vet.availability || "Unknown"}</td>
                </tr>
            `;
        });

        const section = document.createElement("section");
        section.className = "cycle-card";

        section.innerHTML = `
            <h2>Cycle ${cycle.cycleId} (${cycle.status})</h2>

            <div class="progress-container">
                <div class="progress-bar" style="width:${progressValue}%"></div>
                <span>${progressValue}%</span>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Seq</th>
                        <th>Veteran</th>
                        <th>Sessions</th>
                        <th>Status</th>
                        <th>Availability</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        `;

        mainContainer.appendChild(section);
    });

    document.getElementById("total-vets").innerText = totalReached;
    document.getElementById("grad-count").innerText = totalGrads;
}

/* -----------------------------
   DATA LOADING
----------------------------- */
function loadData() {
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRZrgM6dmSRKecR8YR63T4Hvhq9vShmdLKvyqkx-HbO7DbXVNpBdhBl5SfOJFzvtFWBBwYnVYpNo_5z/pub?output=csv";

    Papa.parse(url, {
        download: true,
        header: true,
        complete: (res) => processData(res.data)
    });
}

/* -----------------------------
   PROCESS DATA
----------------------------- */
function processData(rows) {

    const grouped = {};

    rows.forEach(r => {
        const id = (r.cycleId || "").trim();
        if (!id) return;

        if (!grouped[id]) {
            grouped[id] = {
                cycleId: id,
                status: r.status,
                startDate: r.startDate,
                endDate: r.endDate,
                vets: []
            };
        }

        grouped[id].vets.push({
            seq: r.vetSeq,
            name: r.vetName,
            availability: r.availability,
            session: r.currentSession
        });
    });

    allCycleData = Object.values(grouped);
    buildDashboard(allCycleData);
}

/* -----------------------------
   INIT
----------------------------- */
loadData();
</script>

</body>
</html>
